<div class="award-card reveal-on-scroll">
    <div class="award-watermark" aria-hidden="true">
        <i class="fas fa-trophy"></i>
    </div>
    <div class="award-content">
        <div class="award-icon-wrap">
            <i class="fas fa-trophy" aria-hidden="true"></i>
        </div>
        <h3 class="award-title">{{ include.title }}</h3>
        <p class="award-issuer">{{ include.issuer }}</p>
        <p>{{ include.description }}</p>
    </div>
</div>
