{% assign cat_parts = include.category | split: ' ' %}
<div class="skill-card reveal-on-scroll">
    <div class="skill-card-header">
        <span class="skill-category-emoji" aria-hidden="true">{{ cat_parts[0] }}</span>
        <h3>{% for part in cat_parts offset:1 %}{{ part }}{% unless forloop.last %} {% endunless %}{% endfor %}</h3>
    </div>
    <div class="skill-tags">
        {% for skill in include.skills %}
        <span class="skill-tag">{{ skill }}</span>
        {% endfor %}
    </div>
</div>
